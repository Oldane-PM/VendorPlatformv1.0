# Railway reads this file (not railway.yaml). Docs:
# https://docs.railway.com/reference/config-as-code
#
# Node version: set service variable NODE_VERSION=20 in the Railway dashboard
# (Railpack/mise honors it). package.json "engines" also guides Railpack.
#
[build]
builder = "RAILPACK"
buildCommand = "npm run build"

[deploy]
startCommand = "npm run start"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
